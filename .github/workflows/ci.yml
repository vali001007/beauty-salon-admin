name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Verify runtime baseline
        run: |
          node -e "if (Number(process.versions.node.split('.')[0]) !== 22) process.exit(1)"
          npm --version | grep -E '^10\.'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck:test
      - run: npm run build
      - run: npm run test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test
    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      JWT_SECRET: "ci-test-secret"
      JWT_REFRESH_SECRET: "ci-test-refresh-secret"

  terminal-prototype:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/Ami-Aura-Lite-Kiosk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
        working-directory: .
      - run: npm ci
      - run: npm run build

  ami-semantic-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm ci
        working-directory: packages/server-v2
      - run: npx prisma generate
        working-directory: packages/server-v2
      - run: npm run check:ami-query-hub
      - run: npm run check:ami-semantic-agent
    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      JWT_SECRET: "ci-test-secret"
      JWT_REFRESH_SECRET: "ci-test-refresh-secret"

  deploy-staging:
    needs: [frontend, backend, terminal-prototype, ami-semantic-agent]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip Vercel preview deploy when secrets are missing
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "Vercel preview deploy skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
      - name: Deploy frontend to Vercel (Preview)
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}

  deploy-production:
    needs: [frontend, backend, terminal-prototype, ami-semantic-agent]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip Vercel production deploy when secrets are missing
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "Vercel production deploy skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
      - name: Deploy frontend to Vercel (Production)
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
